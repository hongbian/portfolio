<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@300;400;600;700&family=Share+Tech+Mono&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #F5C842;
  --gold2: #E8A825;
  --blue: #1A6DB5;
  --blue2: #0F3F72;
  --blue-light: #4DA6E8;
  --bg-dark: #0A0F1C;
  --text-dim: #9FB3C8;
}

body {
  background: radial-gradient(circle at center, #0A0F1C, #05070F);
  font-family: 'Share Tech Mono', monospace;
  color: white;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  width: 350px;
  height: 220px;
  background: linear-gradient(135deg, #11192E, #0B1324);
  border: 2px solid var(--blue-light);
  border-radius: 16px;
  padding: 16px;
  position: relative;
  box-shadow: 0 0 25px rgba(77,166,232,0.25);
  overflow: hidden;
}

.corner-frame {
  position: absolute;
  width: 40px;
  height: 40px;
  border: 2px solid var(--blue-light);
}

.corner-frame.tl {
  top: -8px;
  left: -12px;
  border-width: 2px 0 0 2px;
}

.corner-frame.br {
  bottom: -8px;
  right: -12px;
  border-width: 0 2px 2px 0;
}

.label-sm {
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.name-main {
  font-family: 'Orbitron', monospace;
  font-size: 22px;
  font-weight: 600;
  color: var(--gold);
}

.subtitle {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 4px;
}

.section {
  margin-top: 14px;
}

.section-title {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--blue-light);
  margin-bottom: 4px;
}

.bar {
  width: 100%;
  height: 6px;
  background: #1B2A4A;
  border-radius: 4px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  background: linear-gradient(to right, var(--gold), var(--gold2));
}

.skills {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 6px;
}

.skill {
  font-size: 9px;
  padding: 3px 6px;
  border: 1px solid var(--blue-light);
  border-radius: 4px;
  color: var(--blue-light);
}
</style>
</head>

<body>

<div class="card">
  <div class="corner-frame tl"></div>
  <div class="corner-frame br"></div>

  <div class="label-sm">Player Profile</div>
  <div class="name-main">Your Name</div>
  <div class="subtitle">Game Developer / XR Designer</div>

  <div class="section">
    <div class="section-title">LEVEL</div>
    <div class="bar">
      <div class="bar-fill" style="width: 75%"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">SKILLS</div>
    <div class="skills">
      <div class="skill">Unity</div>
      <div class="skill">Blender</div>
      <div class="skill">AR/VR</div>
      <div class="skill">UI/UX</div>
    </div>
  </div>

</div>

</body>
</html>
